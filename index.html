<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

     <!-- Tailwind CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

   <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>
<body class="bg-slate-100">
 
  <!-- DASHBOARD -->
  <header class="max-w-6xl mx-auto p-6 border-b">
    <h1 class="text-3xl font-bold text-slate-800 mb-6">Job Application Tracker</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-white p-5 rounded">
        <p>Total</p>
        <p id="total-count" class="text-2xl font-bold">8</p>
      </div>

      <div class="bg-white p-5 rounded">
        <p>Interview</p>
        <p id="interview-count" class="text-2xl font-bold text-green-500">0</p>
      </div>

      <div class="bg-white p-5 rounded">
        <p>Rejected</p>
        <p id="rejected-count" class="text-2xl font-bold text-red-500">0</p>
      </div>
    </div>
  </header>
    
</body>
</html>
